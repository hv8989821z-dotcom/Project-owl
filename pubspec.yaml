name: flutter_application_1
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  file_picker: ^10.2.0
  flutter:
    sdk: flutter
  rename_app: ^1.6.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: "^0.13.1"

flutter:
  uses-material-design: true
  assets:
    - assets/Logo.png

flutter_icons:
  android: true
  ios: false
  image_path: "assets/Logo.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/Logo.png"
  remove_alpha_ios: true
  min_sdk_android: 21
